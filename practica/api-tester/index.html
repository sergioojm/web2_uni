<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Tester — practica</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
  <h1>API Tester</h1>
  <input id="base-url-input" type="text" placeholder="http://localhost:3000">
  <button id="base-url-save">Apply</button>
  <div id="auth-status"></div>
</nav>

<div class="tabs">
  <button class="tab-btn active" data-tab="auth">Auth</button>
  <button class="tab-btn" data-tab="user">User</button>
  <button class="tab-btn" data-tab="clients">Clients</button>
  <button class="tab-btn" data-tab="projects">Projects</button>
  <button class="tab-btn" data-tab="deliverynotes">Delivery Notes</button>
</div>

<main>

  <!-- AUTH TAB -->
  <section id="tab-auth" class="tab-panel">
    <div class="auth-grid">

      <div class="auth-card">
        <h3>Register / Login</h3>
        <input id="auth-email" type="email" placeholder="Email">
        <input id="auth-password" type="password" placeholder="Password">
        <div style="display:flex;gap:8px;margin-top:4px">
          <button id="auth-register-btn" class="btn-primary">Register</button>
          <button id="auth-login-btn">Login</button>
        </div>
      </div>

      <div class="auth-card">
        <h3>Verify Email</h3>
        <input id="auth-code" type="text" placeholder="6-digit code" maxlength="6">
        <button id="auth-validate-btn" style="margin-top:8px">Validate Code</button>
      </div>

      <div class="auth-card">
        <h3>Refresh Token</h3>
        <p style="color:var(--muted);font-size:12px;margin-bottom:8px">Uses stored refresh token automatically.</p>
        <button id="auth-refresh-btn">Refresh</button>
      </div>

      <div class="auth-card">
        <h3>Logout</h3>
        <p style="color:var(--muted);font-size:12px;margin-bottom:8px">Invalidates the current session.</p>
        <button id="auth-logout-btn">Logout</button>
      </div>

    </div>
  </section>

  <!-- USER TAB -->
  <section id="tab-user" class="tab-panel hidden">
    <div class="user-actions">
      <button id="user-getme-btn" class="btn-primary">Get Me</button>
      <button id="user-onboarding-personal-btn">Onboarding Personal</button>
      <button id="user-onboarding-company-btn">Onboarding Company</button>
      <button id="user-logo-btn">Upload Logo</button>
      <button id="user-change-password-btn">Change Password</button>
      <button id="user-invite-btn">Invite User</button>
      <button id="user-delete-btn" style="background:#450a0a;color:var(--err)">Delete Account</button>
    </div>
    <div id="user-info" style="color:var(--muted);font-style:italic">Click "Get Me" to load profile.</div>
  </section>

  <!-- CLIENTS TAB -->
  <section id="tab-clients" class="tab-panel hidden">
    <div class="filter-bar">
      <input id="filter-client-name" placeholder="Filter by name">
      <button id="clients-search">Search</button>
      <button id="clients-archived-btn">Show Archived</button>
      <button id="clients-create-btn" class="btn-primary">+ New Client</button>
    </div>
    <div class="pagination-bar">
      <button id="clients-prev">Prev</button>
      <span id="clients-page-label">Page 1</span>
      <button id="clients-next">Next</button>
    </div>
    <div id="clients-table-container"></div>
  </section>

  <!-- PROJECTS TAB -->
  <section id="tab-projects" class="tab-panel hidden">
    <div class="filter-bar">
      <button id="projects-search">Refresh</button>
      <button id="projects-archived-btn">Show Archived</button>
      <button id="projects-create-btn" class="btn-primary">+ New Project</button>
    </div>
    <div class="pagination-bar">
      <button id="projects-prev">Prev</button>
      <span id="projects-page-label">Page 1</span>
      <button id="projects-next">Next</button>
    </div>
    <div id="projects-table-container"></div>
  </section>

  <!-- DELIVERY NOTES TAB -->
  <section id="tab-deliverynotes" class="tab-panel hidden">
    <div class="filter-bar">
      <button id="deliverynotes-search">Refresh</button>
      <button id="deliverynotes-create-btn" class="btn-primary">+ New Note</button>
    </div>
    <div class="pagination-bar">
      <button id="deliverynotes-prev">Prev</button>
      <span id="deliverynotes-page-label">Page 1</span>
      <button id="deliverynotes-next">Next</button>
    </div>
    <div id="deliverynotes-table-container"></div>
  </section>

</main>

<!-- RESPONSE PANEL -->
<aside id="response-panel">
  <div class="response-header">
    <span id="response-status-badge" class="badge"></span>
    <span id="response-panel-title">Last Response</span>
    <button id="response-panel-toggle">Hide</button>
  </div>
  <pre id="response-body">No requests made yet.</pre>
</aside>

<!-- MODAL -->
<div id="modal-overlay" class="hidden">
  <div id="modal">
    <h2 id="modal-title">
      Modal
      <button id="modal-close">×</button>
    </h2>
    <div id="modal-body"></div>
    <div class="modal-footer">
      <button id="modal-cancel">Cancel</button>
      <button id="modal-submit" class="btn-primary">Submit</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div id="toast-container"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
